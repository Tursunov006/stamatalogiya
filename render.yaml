services:
  - type: web
    name: stomatologiya
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    envVars:
      - key: SECRET_KEY
        value: django-insecure-render-production-key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com,*.onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
    
  - type: pserv
    name: stomatologiya-db
    env: postgres
    plan: free
    ipAllowList: []
